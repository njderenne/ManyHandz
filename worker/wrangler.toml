name = "manyhandz"
main = "index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain — the public face of the app (web + API + auth callbacks). manyhandz.io is an
# active zone in the same Cloudflare account; wrangler provisions the cert + DNS on deploy.
routes = [{ pattern = "manyhandz.io", custom_domain = true }]

# Plain vars. ENVIRONMENT=development unlocks dev-only routes (/api/dev/*), email previews, and the
# readiness doctor's /api/dev/health integrity probe during build-out. Omit/flip for production.
# MIN_APP_VERSION is the /api/meta force-update floor — permissive (current app version); raise it
# to force store updates.
[vars]
ENVIRONMENT = "development"
MIN_APP_VERSION = "0.1.0"

# Static web assets (the Expo web export → ../dist, written by `npm run export:web` at the
# app root). Unmatched routes fall back to index.html so the React Native Web build's
# client-side routing works on deep links / refresh.
[assets]
directory = "../dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Run the Worker before serving assets so it can inject SEO <head> tags into the SPA index.html
# (worker/seo.ts). Without this, Cloudflare serves matched assets directly and the Worker never runs
# for "/". The fallback in worker/index.ts proxies non-HTML assets straight through via ASSETS.fetch.
run_worker_first = true

[observability]
enabled = true

# Cron → the `scheduled` handler in worker/cron.ts (template housekeeping every 6h; minted apps
# add their reminder/digest jobs there).
[triggers]
crons = ["0 */6 * * *"]

# Rate limiting — fixed-window abuse caps on the expensive routes (worker/middleware/rate-limit.ts).
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "f96e2c56b55d4ec0988636f06a63ca9e"

# Media uploads (worker/routes/media.ts) — avatars, chore reference photos, before/after proof.
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "manyhandz-media"

# --- Provisioned per-app by the factory (Phase 2+) ---
# [[d1_databases]]          # simple/experiment tier
# [[durable_objects.bindings]]  # realtime rooms (opt-in)
#
# Plain vars (optional): MIN_APP_VERSION — the /api/meta force-update floor, e.g.
#   [vars]
#   MIN_APP_VERSION = "0.1.0"
#   ENVIRONMENT = "development"   # unlocks dev-only routes (/api/dev/email/*); omit in production
#
# Secrets (set via `wrangler secret put`):
#   DATABASE_URL, BETTER_AUTH_SECRET, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,
#   RESEND_API_KEY, OPENAI_API_KEY, ANTHROPIC_API_KEY
